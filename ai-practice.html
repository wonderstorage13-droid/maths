<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Practice — Maths Practice</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main>
      <div id="topbar"></div>

      <h2 style="margin:0 0 4px;">✨ AI Practice</h2>
      <p style="color:var(--muted); margin:0 0 20px;">One AI-generated question a day, on the clock. It's never saved to your topic scores or the leaderboard.</p>

      <div id="aiArea" style="max-width: 640px;"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = MP.requireUserOrRedirect();
    if (user) {
      renderLayout('ai-practice.html');
      const area = document.getElementById('aiArea');
      const today = new Date().toDateString();
      const lastUsed = MP.get(MP_KEYS.aiLast, null);

      function alreadyUsedToday() {
        area.innerHTML = `
          <div class="card empty-state">
            <div class="empty-emoji">✅</div>
            <b>Today's AI question is done.</b>
            <p style="color:var(--muted);">Come back tomorrow for a fresh one.</p>
          </div>`;
      }

      function loadingState() {
        area.innerHTML = `<div class="card empty-state"><div class="empty-emoji">✨</div>Generating your question...</div>`;
      }

      function errorState(msg) {
        area.innerHTML = `
          <div class="card empty-state">
            <div class="empty-emoji">⚠️</div>
            <b>Couldn't reach the AI.</b>
            <p style="color:var(--muted); font-size:13px;">${msg}</p>
            <p style="color:var(--muted); font-size:12px;">This feature needs a <code>GROQ_API_KEY</code> environment variable set on your Cloudflare Pages project (Settings → Environment variables).</p>
            <button class="btn btn-outline" id="retryBtn">Try Again</button>
          </div>`;
        document.getElementById('retryBtn').addEventListener('click', render);
      }

      async function fetchAIQuestion() {
        const res = await fetch('/api/ai-question', { method: 'POST' });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'Request failed.');
        return data;
      }

      async function startSession() {
        loadingState();
        try {
          const q = await fetchAIQuestion();
          runQuestion(q);
        } catch (e) {
          errorState(e.message || 'Please try again in a moment.');
        }
      }

      function runQuestion(q) {
        let seconds = 0;
        const timerHandle = setInterval(() => {
          seconds++;
          const el = document.getElementById('aiTimer');
          if (el) el.textContent = '⏱️ ' + MP.fmtClock(seconds);
        }, 1000);

        area.innerHTML = `
          <div class="runner-top">
            <div style="font-weight:700;">✨ AI Question of the Day</div>
            <div class="timer-pill" id="aiTimer">⏱️ 00:00</div>
          </div>
          <div class="card">
            <div style="font-size:19px; font-weight:700; margin-bottom:20px;">${q.question}</div>
            <div id="aiOptionsArea"></div>
          </div>`;
        const optionsArea = document.getElementById('aiOptionsArea');
        q.options.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt;
          btn.addEventListener('click', () => {
            clearInterval(timerHandle);
            const isRight = i === q.answerIndex;
            if (isRight) btn.classList.add('correct');
            else {
              btn.classList.add('wrong');
              optionsArea.children[q.answerIndex].classList.add('correct');
            }
            MP.set(MP_KEYS.aiLast, today);
            setTimeout(() => {
              area.innerHTML = `
                <div class="card" style="text-align:center; padding:40px 24px;">
                  <div style="font-size:40px;">${isRight ? '🎉' : '💡'}</div>
                  <h2 style="margin:12px 0 4px;">${isRight ? 'Correct!' : 'Not quite'}</h2>
                  <p style="color:var(--muted); margin:0 0 24px;">${MP.fmtClock(seconds)} elapsed · not saved to your score or leaderboard</p>
                  <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
                </div>`;
            }, 600);
          });
          optionsArea.appendChild(btn);
        });
      }

      function render() {
        if (lastUsed === today) { alreadyUsedToday(); return; }
        startSession();
      }

      render();
    }
  </script>
</body>
</html>
