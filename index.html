<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maths Practice — Welcome</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="onboard-wrap">
    <div class="onboard-card">
      <div class="brand-badge" style="margin: 0 auto 16px;">√x</div>
      <h2 style="margin: 0 0 6px;">Welcome to Maths Practice</h2>
      <p style="color: var(--muted); font-size: 14px; margin: 0 0 24px;">Practice. Learn. Master.<br/>Tell us your name to create your one-time player ID.</p>
      <input type="text" id="nameInput" placeholder="Enter your name" style="margin-bottom: 14px;" />
      <button class="btn btn-primary btn-block" id="startBtn">Start Practicing</button>
      <p style="color: var(--muted); font-size: 11px; margin-top: 16px;">Your name and ID are saved only on this device (local storage).</p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Already onboarded? go straight to dashboard.
    if (MP.getUser()) window.location.href = 'dashboard.html';

    const btn = document.getElementById('startBtn');
    const input = document.getElementById('nameInput');

    function submit() {
      const name = input.value.trim();
      if (!name) { input.style.borderColor = '#e5484d'; input.focus(); return; }
      MP.createUser(name);
      MP.touchStreak();
      window.location.href = 'dashboard.html';
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>
