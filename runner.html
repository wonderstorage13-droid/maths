<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Practice — Maths Practice</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main>
      <div id="topbar"></div>

      <div id="runnerArea" style="max-width: 640px; margin: 0 auto;"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = MP.requireUserOrRedirect();
    if (user) {
      renderLayout('practice.html');

      const params = new URLSearchParams(window.location.search);
      const topicId = params.get('id');
      const topic = getTopicById(topicId);
      const TOTAL = 10;
      const area = document.getElementById('runnerArea');

      if (!topic) {
        area.innerHTML = `<div class="card empty-state"><div class="empty-emoji">❓</div>Topic not found. <a href="topics.html" style="color:var(--indigo);">Browse topics</a></div>`;
      } else {
        let index = 0, correct = 0, current = null, answered = false, seconds = 0, timerHandle = null;

        function bookmarkBtn() {
          const isBm = MP.isBookmarked(topicId);
          return `<button class="btn btn-outline btn-sm" id="bmBtn">${isBm ? '🔖 Bookmarked' : '🔖 Bookmark'}</button>`;
        }

        function startTimer() {
          timerHandle = setInterval(() => {
            seconds++;
            const el = document.getElementById('timerPill');
            if (el) el.textContent = '⏱️ ' + MP.fmtClock(seconds);
          }, 1000);
        }
        function stopTimer() { clearInterval(timerHandle); }

        function renderQuestion() {
          current = generateQuestion(topicId);
          answered = false;
          area.innerHTML = `
            <div class="runner-top">
              <div>
                <div style="font-weight:700; font-size:15px;">${topic.icon} ${topic.name}</div>
                <div style="font-size:12px; color:var(--muted);">Question ${index + 1} of ${TOTAL}</div>
              </div>
              <div style="display:flex; gap:10px; align-items:center;">
                <div class="timer-pill" id="timerPill">⏱️ ${MP.fmtClock(seconds)}</div>
                ${bookmarkBtn()}
              </div>
            </div>
            <div class="card">
              <div style="font-size:19px; font-weight:700; margin-bottom:20px;">${current.question}</div>
              <div id="optionsArea"></div>
            </div>
          `;
          const optionsArea = document.getElementById('optionsArea');
          current.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.addEventListener('click', () => selectOption(i, btn));
            optionsArea.appendChild(btn);
          });
          attachBookmarkHandler();
        }

        function attachBookmarkHandler() {
          const btn = document.getElementById('bmBtn');
          btn.addEventListener('click', () => {
            MP.toggleBookmark(topicId);
            document.getElementById('bmBtn').outerHTML = bookmarkBtn();
            attachBookmarkHandler();
          });
        }

        function selectOption(i, btn) {
          if (answered) return;
          answered = true;
          const isRight = i === current.answerIndex;
          if (isRight) { correct++; btn.classList.add('correct'); }
          else {
            btn.classList.add('wrong');
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns[current.answerIndex].classList.add('correct');
          }
          setTimeout(() => {
            index++;
            if (index >= TOTAL) finish();
            else renderQuestion();
          }, 550);
        }

        function finish() {
          stopTimer();
          MP.recordSession(topicId, TOTAL, correct, seconds);
          const acc = Math.round((correct / TOTAL) * 100);
          MP.submitScore(acc, `${topic.name} · ${correct}/${TOTAL}`);
          area.innerHTML = `
            <div class="card" style="text-align:center; padding:40px 24px;">
              <div style="font-size:40px;">${acc >= 80 ? '🎉' : acc >= 50 ? '👍' : '💪'}</div>
              <h2 style="margin:12px 0 4px;">${correct} / ${TOTAL} Correct</h2>
              <p style="color:var(--muted); margin:0 0 24px;">${acc}% accuracy · ${MP.fmtClock(seconds)} elapsed</p>
              <div style="display:flex; gap:12px; justify-content:center;">
                <button class="btn btn-outline" id="againBtn">Practice Again</button>
                <a href="topics.html" class="btn btn-primary">Back to Topics</a>
              </div>
            </div>
          `;
          document.getElementById('againBtn').addEventListener('click', () => {
            index = 0; correct = 0; seconds = 0; startTimer(); renderQuestion();
          });
        }

        startTimer();
        renderQuestion();
      }
    }
  </script>
</body>
</html>
