<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Progress — Maths Practice</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main>
      <div id="topbar"></div>

      <h2 style="margin:0 0 4px;">Progress</h2>
      <p style="color:var(--muted); margin:0 0 18px;">A bar for every topic — best accuracy vs. questions solved.</p>

      <div class="card" style="margin-bottom:20px;">
        <div class="stat-grid" id="summaryGrid"></div>
      </div>

      <div class="card">
        <div id="progressList"></div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = MP.requireUserOrRedirect();
    if (user) {
      renderLayout('progress.html');

      const scores = MP.getAllScores();
      const stats = MP.getStats();
      const acc = stats.totalSolved ? Math.round((stats.totalCorrect / stats.totalSolved) * 100) : 0;
      const startedCount = Object.keys(scores).length;

      document.getElementById('summaryGrid').innerHTML = `
        <div class="stat-item"><div class="stat-icon" style="background:#eef0ff;">📘</div>
          <div><div class="stat-value">${stats.totalSolved}</div><div class="stat-label">Total Solved</div></div></div>
        <div class="stat-item"><div class="stat-icon" style="background:#e5f9f6;">🎯</div>
          <div><div class="stat-value">${acc}%</div><div class="stat-label">Overall Accuracy</div></div></div>
        <div class="stat-item"><div class="stat-icon" style="background:#fef2df;">📚</div>
          <div><div class="stat-value">${startedCount} / ${TOPICS.length}</div><div class="stat-label">Topics Started</div></div></div>
        <div class="stat-item"><div class="stat-icon" style="background:#eef0ff;">🔥</div>
          <div><div class="stat-value">${stats.streak}</div><div class="stat-label">Day Streak</div></div></div>
      `;

      const rows = TOPICS.map(t => {
        const s = scores[t.id] || { solved: 0, best: 0 };
        return { t, s };
      }).sort((a, b) => b.s.solved - a.s.solved);

      document.getElementById('progressList').innerHTML = rows.map(({ t, s }) => `
        <div style="margin-bottom:16px;">
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;">
            <span style="font-weight:600;">${t.icon} ${t.name}</span>
            <span style="color:var(--muted);">${s.solved} solved · Best ${s.best}%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${s.best}%;"></div></div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
