<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — Maths Practice</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main>
      <div id="topbar"></div>

      <h2 style="margin:0 0 4px;">Settings</h2>
      <p style="color:var(--muted); margin:0 0 20px;">Your profile is saved only on this device.</p>

      <div class="grid-2">
        <div class="card">
          <b>Profile</b>
          <div style="margin-top:14px;">
            <label style="font-size:12px; color:var(--muted);">Name</label>
            <input type="text" id="nameField" style="margin-top:6px;" />
          </div>
          <div style="margin-top:14px;">
            <label style="font-size:12px; color:var(--muted);">Player ID (one-time, generated at onboarding)</label>
            <input type="text" id="idField" disabled style="margin-top:6px; background:var(--bg); color:var(--muted);" />
          </div>
          <button class="btn btn-primary" id="saveNameBtn" style="margin-top:16px;">Save Name</button>
        </div>


      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = MP.requireUserOrRedirect();
    if (user) {
      renderLayout('settings.html');

      document.getElementById('nameField').value = user.name;
      document.getElementById('idField').value = user.id;

      document.getElementById('saveNameBtn').addEventListener('click', () => {
        const name = document.getElementById('nameField').value.trim();
        if (!name) return;
        const u = MP.getUser();
        u.name = name;
        MP.set(MP_KEYS.user, u);
        location.reload();
      });
    }
  </script>
</body>
</html>
